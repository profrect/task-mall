#mall:
#  web-filter:
#    request-param:
#      enable: true
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 86400
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: random-64
  # 是否输出操作日志
  is-log: true
  is-read-cookie: false
  is-read-header: true

# 开放接口：移动端首页读取启用公告、排行榜聚合读模型，不要求后台登录态。
nemojoy:
  web:
    no-login-uris:
      - /api/open/content/**
      - /api/open/leaderboard/**
    no-perm-uris:
      - /api/open/content/**
      - /api/open/leaderboard/**

# 下游服务地址（阶段1无注册中心，硬编码直连；地址配置化，修正历史写死的 12000 错配）
mall:
  service:
    wallet-base-url: http://127.0.0.1:10002
    user-base-url: http://127.0.0.1:10001
    mission-base-url: http://127.0.0.1:10003
    promotion-base-url: http://127.0.0.1:10004
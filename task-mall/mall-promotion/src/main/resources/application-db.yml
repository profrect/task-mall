spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mall-promotion?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: root
    password: root@123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 连接池中允许的最大连接数（包含空闲和使用中的连接），默认10，生产环境建议20-50
      maximum-pool-size: 50
      # 连接池中保持的最小空闲连接数，保证随时有连接可用，避免临时扩容延迟
      minimum-idle: 10
      # 获取连接的最大等待超时时间（毫秒），默认30秒，建议设为1000-3000ms以实现快速失败
      connection-timeout: 30000
      # 空闲连接的最长存活时间（毫秒），默认10分钟
      idle-timeout: 600000
      # 连接的最大生命周期（毫秒），默认30分钟。建议设置小于MySQL的wait_timeout（默认8小时）
      max-lifetime: 1800000
      # 连接泄露检测阈值（毫秒）。若连接超过该时间未归还，则打印警告日志，排查代码bug
      leak-detection-threshold: 60000
      # 连接池名称，建议按应用命名，便于在监控中识别
      pool-name: pool-mall-promotion

  # 数据库版本管理（liquibase）
  liquibase:
    # 是否开启
    enabled: false
    change-log: classpath:db/changelog/db_master.xml

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      lettuce:
        pool:
          # 最大连接数
          max-active: 20
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接
          min-idle: 3
          # 获取连接的最大等待时间
          max-wait: 2000ms
        shutdown-timeout: 100ms
  redis:
    redisson:
      config: |
        # === 模式一：单机模式配置 ===
        singleServerConfig:
          address: redis://127.0.0.1:6379
          database: 0
          connectionMinimumIdleSize: 5
          connectionPoolSize: 40
          idleConnectionTimeout: 10000
          connectTimeout: 10000
          timeout: 3000

